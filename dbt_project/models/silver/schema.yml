version: 2

models:
  - name: silver_taxi_trips
    description: >
      Silver layer: cleaned, typed, and enriched NYC Yellow Taxi trip records.
      Invalid trips have been filtered out (zero distance, zero fare, invalid passenger
      counts, and trips where pickup >= dropoff time). All columns are cast to appropriate
      types and categorical codes are decoded to human-readable descriptions.
      A surrogate trip_id is generated from composite business keys.
    columns:
      - name: trip_id
        description: "Surrogate key generated from vendor_id, pickup_datetime, dropoff_datetime, pickup_location_id, dropoff_location_id."
        tests:
          - unique
          - not_null

      - name: vendor_id
        description: "Integer code for the TPEP provider. 1=Creative Mobile Technologies, 2=VeriFone Inc."
        tests:
          - not_null
          - accepted_values:
              values: [1, 2]

      - name: pickup_datetime
        description: "Timestamp (NTZ) when the meter was engaged."
        tests:
          - not_null

      - name: dropoff_datetime
        description: "Timestamp (NTZ) when the meter was disengaged."
        tests:
          - not_null

      - name: passenger_count
        description: "Number of passengers. Filtered to valid range 1-6."
        tests:
          - not_null

      - name: trip_distance_miles
        description: "Trip distance in miles as reported by the taximeter. Always > 0 after filtering."
        tests:
          - not_null

      - name: pickup_location_id
        description: "TLC Taxi Zone ID for the pickup location."
        tests:
          - not_null
          - relationships:
              to: ref('silver_taxi_zones')
              field: zone_id

      - name: dropoff_location_id
        description: "TLC Taxi Zone ID for the dropoff location."
        tests:
          - not_null
          - relationships:
              to: ref('silver_taxi_zones')
              field: zone_id

      - name: payment_type_code
        description: "Numeric payment type code."
        tests:
          - not_null

      - name: payment_type_desc
        description: "Human-readable payment type."
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Credit card'
                - 'Cash'
                - 'No charge'
                - 'Dispute'
                - 'Unknown'
                - 'Voided trip'

      - name: vendor_name
        description: "Human-readable vendor name decoded from vendor_id."
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Creative Mobile Technologies'
                - 'VeriFone Inc'
                - 'Unknown Vendor'

      - name: fare_amount
        description: "Time-and-distance fare from the meter. Always > 0 after filtering."
        tests:
          - not_null

      - name: total_amount
        description: "Total amount charged to passengers including all surcharges."
        tests:
          - not_null

      - name: trip_duration_minutes
        description: "Computed trip duration in minutes. Always > 0 after filtering."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

      - name: trip_speed_mph
        description: "Computed average trip speed in MPH. NULL if duration is zero."

      - name: is_airport_trip
        description: "Boolean flag: TRUE when rate_code_id = 2 (JFK airport rate)."
        tests:
          - not_null

      - name: tip_pct
        description: "Tip as a percentage of fare. Only populated for credit card payments."

      - name: tip_amount
        description: "Tip amount. Auto-populated for credit card; cash tips not recorded."

      - name: tolls_amount
        description: "Total amount of tolls paid during the trip."

      - name: congestion_surcharge
        description: "NYS congestion surcharge. Defaults to 0 if NULL in source."

      - name: airport_fee
        description: "Airport pickup fee. Defaults to 0 if NULL in source."

      - name: _loaded_at
        description: "Passthrough metadata: timestamp when record was loaded to bronze."

  - name: silver_taxi_zones
    description: >
      Silver layer: cleaned NYC Taxi Zone lookup table. All string columns have
      whitespace trimmed and are uppercased for consistency. A numeric borough_code
      is added for efficient filtering and joining. Airport locations are flagged.
    columns:
      - name: zone_id
        description: "Unique TLC Taxi Zone identifier - primary key."
        tests:
          - unique
          - not_null

      - name: borough
        description: "NYC borough name, uppercased and trimmed."
        tests:
          - not_null
          - accepted_values:
              values:
                - 'MANHATTAN'
                - 'BRONX'
                - 'BROOKLYN'
                - 'QUEENS'
                - 'STATEN ISLAND'
                - 'EWR'

      - name: zone_name
        description: "Specific zone name within borough, uppercased and trimmed."
        tests:
          - not_null

      - name: service_zone
        description: "Service zone classification, uppercased and trimmed."
        tests:
          - not_null

      - name: borough_code
        description: "Numeric code for borough. 1=Manhattan, 2=Bronx, 3=Brooklyn, 4=Queens, 5=Staten Island, 6=EWR."
        tests:
          - not_null

      - name: is_airport
        description: "Boolean flag: TRUE if this zone is classified as an airport."
        tests:
          - not_null
